name: gravity_flip
description: "Gravity Flip — hypercasual 2D mobile game built with Flutter + Flame Engine."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.6.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  flame: ^1.18.0
  flame_audio: ^2.1.1

  firebase_core: ^3.0.0
  firebase_analytics: ^11.0.0
  firebase_crashlytics: ^4.0.0
  cloud_firestore: ^5.0.0
  firebase_auth: ^5.0.0

  google_mobile_ads: ^5.1.0
  in_app_purchase: ^3.2.0

  shared_preferences: ^2.2.0

  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/sprites/
    - assets/audio/
    - assets/fonts/
